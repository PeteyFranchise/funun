name: Close completed pull requests

on:
  pull_request_target:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-completed-pr:
    name: Close PR labeled completed
    if: >-
      ${{
        github.event.pull_request.state == 'open' &&
        github.event.label.name == 'completed'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Comment and close pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const pullRequest = context.payload.pull_request

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullRequest.number,
              body: [
                'Closing this pull request because it was labeled `completed`.',
                '',
                'If this PR still needs work, reopen it and remove the `completed` label.'
              ].join('\n')
            })

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pullRequest.number,
              state: 'closed'
            })

